# fly.toml app configuration file generated for pokedex-red-mountain-6016 on 2026-05-16T23:35:45+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pokedex-red-mountain-6016'
primary_region = 'arn'

[build]

[env]
  PORT="5001"

[processes]
  app = "node app.js"

[http_service]
  internal_port = 5001 # ensure that this is same as above!
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024